<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Μια Ειδική Πρόσκληση! 💌</title>
<style>
:root{--p:#ff2d6d;--p2:#ff7aa8;--s:#ffb3c1;--t:#590d22;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden}
body{font-family:'Trebuchet MS','Segoe UI',sans-serif;color:var(--t);display:flex;justify-content:center;align-items:center;min-height:100vh;position:relative;
background:linear-gradient(-45deg,#ffe5ec,#ffc2d4,#ffd6e0,#ffb3c1,#ffcce0);background-size:400% 400%;animation:bg 14s ease infinite;user-select:none}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.fx{position:fixed;inset:0;overflow:hidden;z-index:1;pointer-events:none}
.heart{position:absolute;bottom:-60px;animation:up linear infinite}
@keyframes up{0%{transform:translateY(0) rotate(0) scale(1);opacity:0}10%,88%{opacity:.7}100%{transform:translateY(-115vh) rotate(420deg) scale(1.3);opacity:0}}
.spark{position:absolute;color:#fff;text-shadow:0 0 10px #ff9ec4;animation:tw 3s ease-in-out infinite}
@keyframes tw{0%,100%{opacity:0;transform:scale(.2) rotate(0)}50%{opacity:1;transform:scale(1.3) rotate(180deg)}}

/* ---- loading envelope ---- */
#loader{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;justify-content:center;align-items:center;
background:linear-gradient(135deg,#ff7aa8,#ff2d6d);transition:opacity .6s,visibility .6s}
#loader.hide{opacity:0;visibility:hidden}
.env{font-size:6rem;animation:shake 1.2s ease-in-out infinite;transform-origin:center}
@keyframes shake{0%,100%{transform:rotate(-6deg) scale(1)}50%{transform:rotate(6deg) scale(1.1)}}
.env.open{animation:fly .7s forwards}
@keyframes fly{to{transform:scale(2.4) translateY(-40px);opacity:0}}
#loader p{color:#fff;font-size:1.2rem;margin-top:20px;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.tap{color:#fff;margin-top:8px;font-size:.95rem;opacity:.85;animation:blink 1.4s infinite}

.card{background:rgba(255,255,255,.97);padding:34px 30px;border-radius:30px;
box-shadow:0 0 0 4px rgba(255,45,109,.12),0 20px 50px rgba(255,45,109,.4);
text-align:center;max-width:430px;width:88%;z-index:2;position:relative;
transform-style:preserve-3d;transition:transform .15s ease-out;animation:pop .7s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(.5) rotate(-8deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}

.screen{display:none}.screen.active{display:block;animation:fade .55s ease}
@keyframes fade{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:none}}

h1{margin:.3em 0;font-size:1.7rem;background:linear-gradient(90deg,#ff2d6d,#ff7aa8,#ffba08,#ff2d6d);background-size:300% auto;
-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:sh 4s linear infinite}
@keyframes sh{to{background-position:300% center}}
p{font-size:1.05rem;line-height:1.5}
#intLine{min-height:1.4em;font-weight:600;color:var(--p)}

.big{font-size:4.2rem;display:inline-block;animation:wob 1.4s ease-in-out infinite}
@keyframes wob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-14px) rotate(5deg)}}

.btns{display:flex;justify-content:center;gap:18px;margin-top:28px;position:relative;min-height:56px;flex-wrap:wrap}
button{padding:14px 30px;border:none;border-radius:50px;cursor:pointer;font-weight:bold;font-size:1.05rem;font-family:inherit;transition:transform .15s}
button:active{transform:scale(.92)}
.yes,.submit,.ics{background:linear-gradient(135deg,#ff2d6d,#ff7aa8);color:#fff;box-shadow:0 0 20px rgba(255,45,109,.6);animation:glow 1.8s ease-in-out infinite}
.yes:hover,.submit:hover,.ics:hover{transform:scale(1.09)}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(255,45,109,.55)}50%{box-shadow:0 0 38px rgba(255,45,109,.95)}}
.no{background:#fff;border:2px solid var(--s);color:var(--t);width:92px;height:50px;padding:0}
.ics{margin-top:16px;font-size:.95rem;padding:11px 22px}

.opts{text-align:left;margin-top:10px}
label{font-weight:700;display:block;margin:4px 0 6px}
select,input{width:100%;padding:13px;border:2px solid var(--s);border-radius:14px;margin-bottom:14px;font-size:1rem;font-family:inherit;background:#fff}
select:focus,input:focus{outline:none;border-color:var(--p);box-shadow:0 0 12px rgba(255,45,109,.4)}

.burst{position:fixed;z-index:6;pointer-events:none;font-size:20px;animation:bst .9s ease-out forwards}
@keyframes bst{0%{transform:translate(0,0) scale(.4);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(1.4) rotate(var(--r));opacity:0}}
.conf{position:fixed;z-index:5;width:11px;height:11px;animation:fall linear forwards;pointer-events:none}
@keyframes fall{to{transform:translateY(108vh) rotate(900deg);opacity:0}}

#snd{position:fixed;top:14px;right:14px;z-index:25;background:rgba(255,255,255,.85);border:none;border-radius:50%;width:46px;height:46px;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 14px rgba(255,45,109,.3);padding:0}
.type::after{content:'|';animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}

.count{margin-top:18px;background:linear-gradient(135deg,#fff0f5,#ffe0ec);border:2px dashed var(--s);border-radius:18px;padding:16px}
.count .lbl{font-size:.85rem;font-weight:700;color:var(--p);letter-spacing:.5px}
.cdgrid{display:flex;justify-content:center;gap:10px;margin-top:8px}
.cdbox{background:#fff;border-radius:12px;padding:10px 8px;min-width:58px;box-shadow:0 3px 10px rgba(255,45,109,.18)}
.cdnum{font-size:1.5rem;font-weight:800;color:var(--p)}
.cdunit{font-size:.7rem;color:var(--t);opacity:.7}
</style>
</head>
<body>
<div class="fx" id="fx"></div>
<button id="snd" onclick="toggleSound()" title="Ήχος">🔊</button>

<!-- loading envelope -->
<div id="loader" onclick="openEnv()">
  <div class="env" id="env">💌</div>
  <p>Κάτι σε περιμένει...</p>
  <div class="tap">πάτα να ανοίξεις 👆</div>
</div>

<div class="card" id="card">
  <div id="screen1" class="screen active">
    <div class="big">💌</div>
    <p id="intLine"></p>
    <h1>Έχεις μια πρόσκληση! 🎉</h1>
    <p>Λοιπόν... θα βγεις ραντεβού μαζί μου; 🥺👉👈</p>
    <div class="btns">
      <button class="yes" onclick="yes(event)">ΝΑΙ! 💖</button>
      <button class="no" id="noBtn" onclick="dodge(event)" onmouseover="dodge(event)">Όχι</button>
    </div>
  </div>

  <div id="screen2" class="screen">
    <div class="big">😳</div>
    <h1>Δεν το πιστεύω πάτησες ναι! 🥺🎊</h1>
    <p>Εντάξει εντάξει το παίζω χαζός που εκπλήσσομαι 😜 ...πες μου τώρα:</p>
    <div class="opts">
      <label>Τι λες να κάνουμε; 😏</label>
      <select id="activity">
        <option>🍸 Ποτό</option>
        <option>🍝 Φαγητό</option>
        <option>☕ Καφέ</option>
        <option>🎁 Έκπληξη!</option>
      </select>
      <label>📅 Ποια μέρα;</label><input type="date" id="date">
      <label>⏰ Τι ώρα;</label><input type="time" id="time">
    </div>
    <div class="btns"><button class="submit" onclick="submitChoice(event)">Κλείσ' το ραντεβού! ❤️</button></div>
  </div>

  <div id="screen3" class="screen">
    <div class="big">🥰</div>
    <h1>ΚΛΕΙΔΩΣΕ! 🔒💞</h1>
    <p id="summary" class="type"></p>
    <div class="count" id="countWrap">
      <div class="lbl">ΑΠΟΜΕΝΟΥΝ ΓΙΑ ΤΟ ΡΑΝΤΕΒΟΥ ΜΑΣ 💕</div>
      <div class="cdgrid">
        <div class="cdbox"><div class="cdnum" id="cdD">0</div><div class="cdunit">μέρες</div></div>
        <div class="cdbox"><div class="cdnum" id="cdH">0</div><div class="cdunit">ώρες</div></div>
        <div class="cdbox"><div class="cdnum" id="cdM">0</div><div class="cdunit">λεπτά</div></div>
        <div class="cdbox"><div class="cdnum" id="cdS">0</div><div class="cdunit">δευτ.</div></div>
      </div>
    </div>
    <button class="ics" onclick="downloadICS()">📅 Πρόσθεσέ το στο ημερολόγιό σου</button>
  </div>
</div>

<script>
/* ---------- ambient hearts + sparks ---------- */
const fx=document.getElementById('fx'),H=['❤️','💖','💝','💕','💗','💞','💓','🌸'];
for(let i=0;i<24;i++){const h=document.createElement('div');h.className='heart';h.textContent=H[i%H.length];
h.style.left=Math.random()*100+'vw';h.style.fontSize=(16+Math.random()*26)+'px';
h.style.animationDuration=(5+Math.random()*6)+'s';h.style.animationDelay=Math.random()*7+'s';
h.style.color='rgba(255,45,109,'+(.2+Math.random()*.45)+')';fx.appendChild(h);}
for(let i=0;i<20;i++){const s=document.createElement('div');s.className='spark';s.textContent='✨';
s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';
s.style.fontSize=(10+Math.random()*16)+'px';s.style.animationDelay=Math.random()*3+'s';fx.appendChild(s);}

/* ---------- sound ---------- */
let soundOn=true,actx=null;
function toggleSound(){soundOn=!soundOn;document.getElementById('snd').textContent=soundOn?'🔊':'🔇';if(soundOn)beep(660,.08);}
function beep(freq,dur,type){if(!soundOn)return;try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
const o=actx.createOscillator(),g=actx.createGain();o.type=type||'sine';o.frequency.value=freq;
o.connect(g);g.connect(actx.destination);g.gain.setValueAtTime(.0001,actx.currentTime);
g.gain.exponentialRampToValueAtTime(.25,actx.currentTime+.01);
g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);o.start();o.stop(actx.currentTime+dur);}catch(e){}}
function chime(){beep(523,.12);setTimeout(()=>beep(659,.12),90);setTimeout(()=>beep(784,.2),180);}
function pop(){beep(880,.07,'triangle');}

/* ---------- loader ---------- */
function openEnv(){const e=document.getElementById('env');e.classList.add('open');chime();
setTimeout(()=>{document.getElementById('loader').classList.add('hide');typeIntro();},650);}
function typeIntro(){const el=document.getElementById('intLine'),txt='έφτιαξα κάτι μόνο για σένα... 🥹';let i=0;
(function t(){if(i<txt.length){el.textContent+=txt[i++];if(txt[i-1].trim())pop();setTimeout(t,55);}})();}

/* ---------- 3D tilt ---------- */
const card=document.getElementById('card');
function tilt(x,y){const r=card.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
const rx=Math.max(-8,Math.min(8,(cy-y)/22)),ry=Math.max(-8,Math.min(8,(x-cx)/22));
card.style.transform=`perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg)`;}
window.addEventListener('mousemove',e=>tilt(e.clientX,e.clientY));
window.addEventListener('touchmove',e=>{if(e.touches[0])tilt(e.touches[0].clientX,e.touches[0].clientY)},{passive:true});
window.addEventListener('mouseleave',()=>card.style.transform='');

/* ---------- effects ---------- */
function confetti(){const c=['#ff2d6d','#ff7aa8','#ffd6e0','#ffba08','#fff','#9d4edd'];
for(let i=0;i<110;i++){const d=document.createElement('div');d.className='conf';
d.style.left=Math.random()*100+'vw';d.style.top='-20px';d.style.background=c[i%c.length];
d.style.borderRadius=Math.random()>.5?'50%':'2px';d.style.animationDuration=(2+Math.random()*2.2)+'s';
d.style.animationDelay=(Math.random()*.4)+'s';document.body.appendChild(d);setTimeout(()=>d.remove(),4800);}}
function emojiBurst(x,y){const e=['❤️','💖','🎉','✨','💕','⭐','💞'];
for(let i=0;i<14;i++){const s=document.createElement('div');s.className='burst';s.textContent=e[i%e.length];
s.style.left=x+'px';s.style.top=y+'px';const a=Math.random()*6.28,dist=60+Math.random()*90;
s.style.setProperty('--dx',Math.cos(a)*dist+'px');s.style.setProperty('--dy',Math.sin(a)*dist+'px');
s.style.setProperty('--r',(Math.random()*720-360)+'deg');document.body.appendChild(s);setTimeout(()=>s.remove(),950);}}

/* ---------- screens ---------- */
function go(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('screen'+n).classList.add('active');}
function yes(ev){chime();confetti();emojiBurst(ev.clientX||innerWidth/2,ev.clientY||innerHeight/2);go(2);}

/* playful "No" — taunts, shrinks, then gives up */
const taunts=['Όχι','σίγουρα;','σκέψου το 🤨','αμ;','πιάσε με 😏','έλα μωρέ','τελευταία ευκαιρία'];
let noStep=0;
function dodge(ev){pop();noStep++;const b=document.getElementById('noBtn');
if(noStep>=7){b.textContent='καλά, ΝΑΙ τότε 😏';b.style.position='static';b.style.transform='scale(.95)';
b.onclick=yes;b.onmouseover=null;if(ev)ev.preventDefault();return;}
b.textContent=taunts[noStep];const sc=Math.max(.5,1-noStep*.08);b.style.transform=`scale(${sc})`;
const W=92,Hh=50;b.style.position='fixed';b.style.zIndex='4';
b.style.left=(8+Math.random()*Math.max(0,innerWidth-W-16))+'px';
b.style.top=(8+Math.random()*Math.max(0,innerHeight-Hh-16))+'px';if(ev)ev.preventDefault();}

/* ---------- submit + countdown + ics ---------- */
let chosen={a:'',d:'',t:''};
function submitChoice(ev){const a=activity.value,d=date.value,t=time.value;
if(!d||!t){beep(200,.2,'sawtooth');alert('Έλα ντε, βάλε μέρα και ώρα! 😅');return;}
chosen={a,d,t};chime();confetti();emojiBurst(ev.clientX||innerWidth/2,ev.clientY||innerHeight/2);
go(3);typeOut(`${a}\n📅 ${d}\n⏰ ${t}\n\nΑνυπομονώ ήδη... 💞`);startCountdown();}

function typeOut(txt){const el=document.getElementById('summary');el.innerHTML='';let i=0;
(function tick(){if(i<txt.length){const ch=txt[i++];el.innerHTML+=ch==='\n'?'<br>':ch;
if(ch.trim())pop();setTimeout(tick,45);}else el.classList.remove('type');})();}

let cdTimer=null;
function startCountdown(){const target=new Date(chosen.d+'T'+chosen.t).getTime();
if(cdTimer)clearInterval(cdTimer);
function upd(){let diff=target-Date.now();if(diff<0)diff=0;
const D=Math.floor(diff/864e5),Hh=Math.floor(diff%864e5/36e5),M=Math.floor(diff%36e5/6e4),S=Math.floor(diff%6e4/1e3);
cdD.textContent=D;cdH.textContent=Hh;cdM.textContent=M;cdS.textContent=S;
if(diff===0){document.querySelector('.count .lbl').textContent='ΕΦΤΑΣΕ Η ΩΡΑ! 🎉💞';clearInterval(cdTimer);}}
upd();cdTimer=setInterval(upd,1000);}

function downloadICS(){const dt=new Date(chosen.d+'T'+chosen.t),end=new Date(dt.getTime()+2*36e5);
const fmt=x=>x.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//date//EL','BEGIN:VEVENT',
'UID:'+Date.now()+'@date','DTSTAMP:'+fmt(new Date()),'DTSTART:'+fmt(dt),'DTEND:'+fmt(end),
'SUMMARY:Το ραντεβού μας '+chosen.a,'DESCRIPTION:💞','END:VEVENT','END:VCALENDAR'].join('\r\n');
const blob=new Blob([ics],{type:'text/calendar'}),url=URL.createObjectURL(blob),a=document.createElement('a');
a.href=url;a.download='rantevou.ics';a.click();URL.revokeObjectURL(url);pop();}

document.getElementById('date').min=new Date().toISOString().split('T')[0];
</script>
</body>
</html>
